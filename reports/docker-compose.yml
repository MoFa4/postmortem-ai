services:
  target_app:
    build: ./target_app
    ports:
      - "8001:8000"
    networks:
      - pm-net

  monitor:
    build: ./monitor
    environment:
      - TARGET_URL=http://target_app:8000
      - POSTMORTEM_URL=http://postmortem-ai:8000
      - SLACK_WEBHOOK_URL=https://hooks.slack.com/services/YOUR/WEBHOOK/URL
      - DRIVE_BASE_URL=https://drive.company.com/reports
    depends_on:
      - target_app
      - postmortem-ai
    networks:
      - pm-net

  postmortem-ai:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./reports:/app/reports
    networks:
      - pm-net

networks:
  pm-net:
    driver: bridge